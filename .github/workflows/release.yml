name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # required to create the draft GitHub Release + upload assets

jobs:
  # Single job that creates (or finds) the draft release once, before the
  # platform matrix fans out. Without this, parallel mac + windows builds
  # both call "create release" and produce two duplicate drafts.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: existing } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            let release = existing.find(r => r.tag_name === tag);
            if (!release) {
              const r = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Pivot Desk ${tag}`,
                draft: true,
                prerelease: false,
              });
              release = r.data;
            }
            core.setOutput('release_id', release.id);

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Python sidecar ─────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      # Sync bundle version to the tag — without this, dmg/msi filenames
      # are stuck on whatever `tauri.conf.json` was last committed with.
      - name: sync version from tag
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          python -c "
          import json, pathlib
          p = pathlib.Path('src-tauri/tauri.conf.json')
          d = json.loads(p.read_text())
          d['version'] = '$V'
          p.write_text(json.dumps(d, indent=2) + '\n')
          print(f'bundle version -> {d[\"version\"]}')
          "

      - name: build sidecar binary
        shell: bash
        env:
          TAURI_TARGET: ${{ matrix.target }}
        run: |
          pip install -e "./sidecar[build]"
          python sidecar/build.py --target "$TAURI_TARGET"


      # ── Node + Rust ────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: 'src-tauri -> target' }

      - run: pnpm install --frozen-lockfile

      # ── Tauri bundle ───────────────────────────────────────────────
      # TAURI_SIGNING_PRIVATE_KEY + _PASSWORD enable updater artifact signing.
      # The .sig files travel alongside the bundles in the draft release; the
      # publish-latest-json job below aggregates them into latest.json.
      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  # After both platform builds finish, read the .sig assets back from the draft
  # release, assemble latest.json (the updater manifest), upload it, and then
  # un-draft the release so `releases/latest/download/latest.json` resolves.
  publish-latest-json:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      # Full history + tags so we can diff the current tag against the previous
      # one to assemble the changelog from commit subjects.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: build changelog from git log
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Previous version by semver order, not commit ancestry: `git describe`
          # walks history and skips tags that share a commit (e.g. when v0.3.2 and
          # v0.3.3 point at the same SHA), producing the wrong range. Sorting tags
          # by version and taking the entry just below TAG is unambiguous.
          PREV_TAG="$(git tag --list 'v*' --sort=-version:refname | awk -v cur="$TAG" 'f{print; exit} $0==cur{f=1}')"
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
            echo "changelog range: ${RANGE}"
          else
            RANGE="${TAG}"
            echo "no previous tag — using full history up to ${TAG}"
          fi
          LOG="$(git log --no-merges --pretty=format:'- %s' "${RANGE}")"
          [ -z "$LOG" ] && LOG="- 维护性更新"
          # Multi-line output needs the heredoc-delimiter form.
          {
            echo 'notes<<__PIVOT_EOF__'
            echo "$LOG"
            echo '__PIVOT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          CHANGELOG: ${{ steps.changelog.outputs.notes }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner, repo: context.repo.repo, release_id: releaseId
            });

            // Match updater artifacts. Tauri 2 produces:
            //   macOS aarch64 → *_aarch64.app.tar.gz + .sig
            const findSig = (re) => release.assets.find(a => re.test(a.name) && a.name.endsWith('.sig'));
            const bundleFor = (sigName) => release.assets.find(a => a.name === sigName.replace(/\.sig$/, ''));

            const matchers = {
              'darwin-aarch64': /aarch64\.app\.tar\.gz\.sig$/,
            };

            const downloadText = async (asset_id) => {
              const r = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner, repo: context.repo.repo, asset_id,
                headers: { accept: 'application/octet-stream' },
              });
              // octokit returns ArrayBuffer when accept is octet-stream
              return Buffer.from(r.data).toString('utf8').trim();
            };

            const platforms = {};
            for (const [platform, re] of Object.entries(matchers)) {
              const sig = findSig(re);
              if (!sig) {
                core.warning(`no updater sig for ${platform} — skipping`);
                continue;
              }
              const bundle = bundleFor(sig.name);
              if (!bundle) {
                core.warning(`sig ${sig.name} has no matching bundle — skipping`);
                continue;
              }
              // Construct a tag-stable URL instead of `browser_download_url`,
              // which during the draft phase resolves to an untagged-* path
              // that breaks the moment a user's client tries to fetch the
              // download (Tauri's updater does not follow GitHub draft URL
              // redirects reliably). The /releases/download/<tag>/<name>
              // form is stable from the moment the release is un-drafted.
              platforms[platform] = {
                signature: await downloadText(sig.id),
                url: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/${encodeURIComponent(bundle.name)}`,
              };
            }

            if (!Object.keys(platforms).length) {
              core.setFailed('no updater platforms resolved — refusing to publish');
              return;
            }

            // Changelog from git log is the source of truth; fall back to any
            // hand-written release body, then a generic line.
            const notes = (process.env.CHANGELOG || '').trim() || release.body || `Pivot Desk ${tag}`;

            const manifest = {
              version,
              notes,
              pub_date: new Date().toISOString(),
              platforms,
            };

            // Replace any prior latest.json on this release.
            const existing = release.assets.find(a => a.name === 'latest.json');
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner, repo: context.repo.repo, asset_id: existing.id,
              });
            }
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner, repo: context.repo.repo, release_id: releaseId,
              name: 'latest.json', data: JSON.stringify(manifest, null, 2),
            });

            // Un-draft (makes /releases/latest/download/latest.json resolve) and
            // write the changelog as the release body so the web page matches the
            // in-app update notes.
            await github.rest.repos.updateRelease({
              owner: context.repo.owner, repo: context.repo.repo, release_id: releaseId,
              draft: false, body: notes,
            });
            core.info(`published ${tag} with platforms: ${Object.keys(platforms).join(', ')}`);
